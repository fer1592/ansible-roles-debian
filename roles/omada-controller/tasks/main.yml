---
- name: Ensure basic packages are installed
  ansible.builtin.apt:
    name:
    - jsvc
    - curl
  become: true

- name: Ensure pip pexpect is installed and up-to-date
  ansible.builtin.pip:
    name:
      - pexpect
    state: latest
    executable: "{{ ansible_facts.python_binaries_path }}/pip"

- name: Set DPKG Architecture
  ansible.builtin.set_fact:
    dpkg_arch: "{{ 'amd64' if (ansible_facts[\"architecture\"] == 'x86_64' or ansible_facts[\"architecture\"] == 'i386') else 'arm64' }}"

- name: Add MongoDB GPG apt Key
  ansible.builtin.get_url:
    url: https://pgp.mongodb.com/server-8.0.asc
    dest: /etc/apt/keyrings/mongodb-server-8.0.gpg
    mode: a+r
  become: true

- name: Check if MongoDB gpg is in place
  ansible.builtin.stat:
    path: "{{ omada_controller_mongodb_gpg_path }}"
  register: mongodb_gpg_present

- name: Import MongoDB GPG key for APT
  ansible.builtin.shell: |
    curl -fsSL "{{ omada_controller_mongodb_gpg_url }}" | gpg --batch --dearmor -o "{{ omada_controller_mongodb_gpg_path }}"
  become: true
  when: not mongodb_gpg_present.stat.exists

- name: Add MongoDB Repository
  ansible.builtin.deb822_repository:
    name: mongodb-org
    architectures: "{{ dpkg_arch }}"
    signed_by: "{{ omada_controller_mongodb_gpg_path }}"
    uris: "{{ omada_controller_mongodb_url }}"
    components: "{{ omada_controller_mongodb_components }}"
    suites: "{{ omada_controller_mongodb_suites }}"
    state: present
    types: "deb"
    enabled: true
  become: true

- name: Ensure mongodb is installed
  ansible.builtin.apt:
    name:
    - mongodb-org
    state: latest
    update_cache: true
  become: true

- name: Ensure mongodb service is enabled and running
  ansible.builtin.service:
    name: mongod
    state: started
    enabled: yes
    daemon_reload: yes
  become: true

- name: Check if Omada Controller is already installed
  ansible.builtin.stat:
    path: /usr/bin/tpeap
  register: omada_installed

- name: Skip installation - Omada already exists
  ansible.builtin.debug:
    msg: "Omada Controller already installed - skipping download and installation"
  when: omada_installed.stat.exists

- name: Install Omada Controller
  when: not omada_installed.stat.exists
  block:
    - name: Create temp Omada Directory
      ansible.builtin.file:
        path: "/tmp/omada"
        state: directory
        mode: '0755'

    - name: Download & Unzip the archive
      ansible.builtin.unarchive:
        src: "{{ omada_controller_download_url }}"
        dest: "/tmp/omada"
        remote_src: 'yes'
        extra_opts:
          --strip-components=1

    - name: Make install.sh executable
      ansible.builtin.file:
        path: "/tmp/omada/install.sh"
        mode: a+x

    - name: Install Omada
      ansible.builtin.expect:
        command: "./install.sh"
        responses:
          'Omada Network Application will be installed in \[.*\] \(y/n\):': "y"
        chdir: "/tmp/omada"
        timeout: 300
      become: true

- name: Ensure Omada Controller service is enabled and started
  ansible.builtin.systemd_service:
    name: tpeap
    enabled: yes
    state: started
  become: true

- name: Clean up temporary directory
  ansible.builtin.file:
    path: "/tmp/omada"
    state: absent

- name: Check if reboot required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot
  ansible.builtin.reboot:
    post_reboot_delay: 600
  when: reboot_required.stat.exists
