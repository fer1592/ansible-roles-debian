---
- name: Pull the latest openclaw image
  community.docker.docker_image_pull:
    name: ghcr.io/openclaw/openclaw
    tag: latest
    pull: always
  become: true

- name: Ensure the openclaw-gateway config directory is present
  ansible.builtin.file:
    path: "/home/{{ ansible_facts.user_id }}/openclaw-gateway/config"
    state: directory
    owner: "{{ ansible_facts.current_user_uid }}"
    group: "{{ ansible_facts.current_user_uid }}"
    mode: 0755
  become: true

- name: Ensure the openclaw-gateway workspace directory is present
  ansible.builtin.file:
    path: "/home/{{ ansible_facts.user_id }}/openclaw-gateway/workspace"
    state: directory
    owner: "{{ ansible_facts.current_user_uid }}"
    group: "{{ ansible_facts.current_user_uid }}"
    mode: 0755
  become: true

- name: Check if openclaw.json already exists
  ansible.builtin.stat:
    path: "/home/{{ ansible_facts.user_id }}/openclaw-gateway/config/openclaw.json"
  register: openclaw_config

- name: Create openclaw.json only if it does not exist
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: "/home/{{ ansible_facts.user_id }}/openclaw-gateway/config/openclaw.json"
    mode: 0755
    force: no
  when: not openclaw_config.stat.exists
  become: true

- name: Ensure the docker network exists if defined
  community.docker.docker_network:
    name: "{{ openclaw_docker_network }}"
    driver: "bridge"
  when: openclaw_docker_network is defined

- name: Ensure the openclaw-gateway container is running
  community.docker.docker_container:
    name: openclaw-gateway
    image: ghcr.io/openclaw/openclaw:latest
    state: started
    hostname: openclaw-gateway
    auto_remove: false
    restart_policy: unless-stopped
    cpus: "{{ openclaw_gateway_cpus }}"
    memory: "{{ openclaw_gateway_memory }}"
    memory_swap: "{{ openclaw_gateway_memory }}"
    network_mode: "{{ openclaw_docker_network | default('bridge') }}"
    groups: "root"
    user: "root"
    detach: true
    published_ports: "{{ openclaw_gateway_ports | default(omit) }}"
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
    - "/home/{{ ansible_facts.user_id }}/openclaw-gateway/config:/home/node/.openclaw"
    - "/home/{{ ansible_facts.user_id }}/openclaw-gateway/workspace:/home/node/.openclaw/workspace"
    env: "{{ openclaw_gateway_env_vars | combine({'OPENCLAW_GATEWAY_TOKEN': openclaw_gateway_env_secrets}) }}"
    log_driver: json-file
    log_options:
      max-size: 50m
      max-file: "3"
  become: true

- name: Check if avahi-daemon is running
  ansible.builtin.set_fact:
    avahi_daemon_running: "{{ ansible_facts.services['avahi-daemon.service'] is defined and ansible_facts.services['avahi-daemon.service'].state == 'running' }}"
  when: openclaw_gateway_avahi_publish is defined and openclaw_gateway_avahi_publish

- name: Ensure the openclaw-gateway avahi-publish systemd service is created
  ansible.builtin.template:
    src: systemd-avahi-publish-openclaw-gateway.service.j2
    dest: "/etc/systemd/system/avahi-publish-openclaw-gateway.service"
    mode: 0644
    owner: root
  become: true
  register: openclaw_gateway_avahi_publish_service
  when: openclaw_gateway_avahi_publish is defined and openclaw_gateway_avahi_publish and avahi_daemon_running and docker_running

- name: Ensure the openclaw-gateway avahi-publish systemd service is enabled and started
  ansible.builtin.systemd_service:
    name: avahi-publish-openclaw-gateway.service
    state: "{{ 'restarted' if openclaw_gateway_avahi_publish_service.changed else 'started' }}"
    enabled: yes
    daemon_reload: "{{ openclaw_gateway_avahi_publish_service.changed }}"
  become: true
  when: openclaw_gateway_avahi_publish is defined and openclaw_gateway_avahi_publish and avahi_daemon_running and docker_running
