---
- name: Pull the latest opencloud image
  community.docker.docker_image_pull:
    name: opencloudeu/opencloud-rolling
    tag: latest
    pull: always
  become: true

- name: Ensure the opencloud config directory is present
  ansible.builtin.file:
    path: "/home/{{ ansible_facts.user_id }}/ansible-roles-debian-data/opencloud/opencloud-config"
    state: directory
    owner: 1000
    group: 1000
    mode: 0755
  become: true

- name: Ensure the opencloud data directory is present
  ansible.builtin.file:
    path: "/home/{{ ansible_facts.user_id }}/ansible-roles-debian-data/opencloud/opencloud-data"
    state: directory
    owner: 1000
    group: 1000
    mode: 0755
  become: true

- name: Ensure the csp.yaml file exists if opencloud_csp_config_block is defined
  ansible.builtin.template:
    src: csp.yml.j2
    dest: "/home/{{ ansible_facts.user_id }}/ansible-roles-debian-data/opencloud/opencloud-config/csp.yml"
    owner: 1000
    group: 1000
    mode: 0644
  become: true
  register: csp_config
  when: opencloud_csp_config_block is defined

- name: Ensure the docker network exists if defined
  community.docker.docker_network:
    name: "{{ opencloud_docker_network }}"
    driver: "bridge"
  when: opencloud_docker_network is defined

- name: Check if opencloud was initialized before
  ansible.builtin.stat:
    path: /home/{{ ansible_facts.user_id }}/ansible-roles-debian-data/opencloud/opencloud-config/opencloud.yaml
  register: opencloud_config_file

- name: Initialize opencloud
  community.docker.docker_container:
    name: opencloud-init
    image: opencloudeu/opencloud-rolling:latest
    state: healthy
    hostname: opencloud-init
    auto_remove: true
    detach: false
    user: "1000:1000"
    restart: "{{ csp_config.changed | default(false) }}"
    volumes:
    - "/home/{{ ansible_facts.user_id }}/ansible-roles-debian-data/opencloud/opencloud-config:/etc/opencloud:rw"
    - "/home/{{ ansible_facts.user_id }}/ansible-roles-debian-data/opencloud/opencloud-data:/var/lib/opencloud:rw"
    env: "{{ opencloud_env_vars }}"
    command: "init"
    log_driver: json-file
    log_options:
      max-size: 50m
      max-file: "3"
  become: true
  when: opencloud_config_file.stat.isreg is not defined

- name: Ensure the opencloud container is running
  community.docker.docker_container:
    name: opencloud
    image: opencloudeu/opencloud-rolling:latest
    state: started
    hostname: opencloud
    auto_remove: false
    restart_policy: unless-stopped
    cpus: "{{ opencloud_cpus }}"
    memory: "{{ opencloud_memory }}"
    memory_swap: "{{ opencloud_memory }}"
    detach: true
    network_mode: "{{ opencloud_docker_network | default('bridge') }}"
    published_ports: "{{ opencloud_ports | default(omit) }}"
    user: "1000:1000"
    volumes:
    - "/home/{{ ansible_facts.user_id }}/ansible-roles-debian-data/opencloud/opencloud-config:/etc/opencloud:rw"
    - "/home/{{ ansible_facts.user_id }}/ansible-roles-debian-data/opencloud/opencloud-data:/var/lib/opencloud:rw"
    env: "{{ opencloud_env_vars }}"
    log_driver: json-file
    log_options:
      max-size: 50m
      max-file: "3"
    healthcheck:
      interval: 15s
      retries: 5
      timeout: 10s
      test: ["CMD", "curl", "-f", "-k", "--max-time", "2", "https://localhost:9200/"]
  become: true

- name: Pull the latest collabora image
  community.docker.docker_image_pull:
    name: collabora/code
    tag: "latest"
    pull: always
  become: true
  when: opencloud_collabora_enabled | default(false)

- name: Ensure the collabora container is running
  community.docker.docker_container:
    name: collabora
    image: collabora/code:latest
    state: healthy
    hostname: collabora
    auto_remove: false
    restart_policy: unless-stopped
    cpus: "{{ opencloud_collabora_cpus }}"
    memory: "{{ opencloud_collabora_memory }}"
    memory_swap: "{{ opencloud_collabora_memory }}"
    detach: true
    network_mode: "{{ opencloud_docker_network | default('bridge') }}"
    privileged: false
    entrypoint: [ '/bin/bash', '-c' ]
    command: [ 'coolconfig generate-proof-key && /start-collabora-online.sh' ]
    security_opts:
      - "seccomp=unconfined"
      - "apparmor:unconfined"
    capabilities:
      - "SYS_ADMIN"
    volumes:
      - "/usr/share/fonts/truetype:/usr/share/fonts/truetype/more:ro"
      - "/usr/share/fonts/truetype:/opt/cool/systemplate/usr/share/fonts/truetype/more:ro"
    env:
      aliasgroup1: "https://{{ opencloud_wopiserver }}"
      DONT_GEN_SSL_CERT: "YES"
      extra_params: "--o:ssl.enable=false --o:ssl.ssl_verification=false --o:ssl.termination=true --o:welcome.enable=false --o:net.frame_ancestors={{ opencloud_env_vars.OC_URL | regex_replace('https://', '') }} --o:net.lok_allow.host[14]={{ opencloud_env_vars.OC_URL | regex_replace('https://', '') }} --o:home_mode.enable=false"
      username: "{{ opencloud_collabora_admin_user }}"
      password: "{{ opencloud_collabora_admin_password }}"
    log_driver: json-file
    log_options:
      max-size: 50m
      max-file: "3"
    healthcheck:
      interval: 15s
      retries: 5
      timeout: 10s
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9980 && printf 'GET /hosting/discovery HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | head -1 | grep -q '200 OK'"]
  become: true
  when: opencloud_collabora_enabled | default(false)

- name: Check if avahi-daemon is running
  ansible.builtin.set_fact:
    avahi_daemon_running: "{{ ansible_facts.services['avahi-daemon.service'] is defined and ansible_facts.services['avahi-daemon.service'].state == 'running' }}"
  when: opencloud_avahi_publish is defined and opencloud_avahi_publish

- name: Ensure the opencloud avahi-publish systemd service is created
  ansible.builtin.template:
    src: systemd-avahi-publish.service.j2
    dest: "/etc/systemd/system/avahi-publish-opencloud.service"
    mode: 0644
    owner: root
  become: true
  register: opencloud_avahi_publish_service
  when: opencloud_avahi_publish is defined and opencloud_avahi_publish and avahi_daemon_running

- name: Ensure the opencloud avahi-publish systemd service is enabled and started
  ansible.builtin.systemd_service:
    name: avahi-publish-opencloud.service
    state: "{{ 'restarted' if opencloud_avahi_publish_service.changed else 'started' }}"
    enabled: yes
    daemon_reload: "{{ opencloud_avahi_publish_service.changed }}"
  become: true
  when: opencloud_avahi_publish is defined and  opencloud_avahi_publish and avahi_daemon_running
